description: >-
  CometAPI is an AI API aggregator that consolidates access to 500+ models
  from multiple providers (OpenAI, Anthropic, Google, xAI, DeepSeek,
  Alibaba, and more) behind a single OpenAI-compatible REST surface. It
  supports chat completions, embeddings, image generation, text-to-video
  and image-to-video, speech synthesis, and audio transcription. CometAPI
  positions itself as a drop-in replacement for the OpenAI SDK (changing
  only the base URL and key), with pay-as-you-go pricing reportedly 20-40%
  cheaper than direct vendor rates, sub-400ms median latency, and 99.9%
  service availability.
apis:
